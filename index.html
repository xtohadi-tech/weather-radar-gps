<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WeatherOS Pro — Radar GPS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #030710;
  --card: #0b1220;
  --border: #1a2640;
  --muted: #4a6080;
  --text: #c8daf2;
  --cyan: #00d4ff;
  --yellow: #ffd166;
  --red: #ff3d6b;
  --green: #10d88a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  padding: 14px 20px; border: 1px solid var(--border); background: linear-gradient(135deg,#0b1220,#070d1a);
  border-radius: 18px; backdrop-filter: blur(20px); position: relative; overflow: hidden;
}
.topbar::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: .6;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-title { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
.brand-sub { color: var(--muted); font-size: 10px; margin-top: 2px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .5px; }

.wrap { max-width: 1100px; margin: 0 auto; padding: 16px; position: relative; z-index: 1; }
.card {
  border: 1px solid var(--border); background: linear-gradient(160deg,#0d1528,#0b1220);
  border-radius: 16px; padding: 18px; position: relative; overflow: hidden;
}
.card + .card { margin-top: 12px; }
.card-label {
  font-size: 10px; color: var(--muted); text-transform: uppercase;
  letter-spacing: 1px; font-weight: 700; margin-bottom: 10px;
  font-family: 'JetBrains Mono', monospace;
}

.temp-hero { font-size: 64px; font-weight: 700; letter-spacing: -3px; line-height: 1; color: #fff; }
.weather-icon { font-size: 44px; line-height: 1; }
.tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.tag {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 10px;
  background: rgba(0,0,0,.3); border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-weight: 500;
}

.search { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.search input {
  flex: 1; min-width: 220px; padding: 11px 14px; border-radius: 12px;
  border: 1px solid var(--border); background: #0a0f18; color: #fff; outline: none; font: inherit; font-size: 14px;
}
.search input::placeholder { color: var(--muted); }
.btn {
  padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border);
  background: linear-gradient(180deg,#141c2b,#111827); color: var(--text); cursor: pointer; font: inherit; font-size: 13px; font-weight: 600;
  transition: .15s; user-select: none;
}
.btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
.btn.primary { background: linear-gradient(180deg,#2563eb,#1d4ed8); border-color: #1e40af; color: #fff; }

.status { min-height: 18px; font-size: 12px; color: var(--muted); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }

.card.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (max-width: 700px) { .card.grid-2 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div>
        <div class="brand-title">WeatherOS Pro</div>
        <div class="brand-sub">Radar · GPS · Realtime · Open-Meteo</div>
      </div>
    </div>
    <div class="status" id="status" style="margin-top:0;color:var(--muted)">Memuat...</div>
  </div>

  <div class="search">
    <input id="city" placeholder="Cari kota atau koordinat..." value="Tokyo" />
    <button class="btn primary" id="goBtn">Cari</button>
    <button class="btn" id="gpsBtn">GPS</button>
    <button class="btn" id="ipBtn">IP</button>
    <button class="btn" id="refreshBtn">Refresh</button>
  </div>

  <!-- Main -->
  <div class="card grid-2" style="margin-top:16px;">
    <div>
      <div class="card-label">Cuaca Saat Ini</div>
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px;">
        <div>
          <div class="temp-hero" id="temp">--°</div>
          <div id="desc" style="margin-top:6px; font-weight:600;">Memuat...</div>
        </div>
        <div class="weather-icon" id="icon">🌦</div>
      </div>
      <div class="tag-row" style="margin-top:10px;">
        <span class="tag" id="feels">Terasa --°</span>
        <span class="tag" id="hum">Kelembaban --%</span>
        <span class="tag" id="wind">Angin -- km/j</span>
        <span class="tag" id="windDir">Arah --</span>
        <span class="tag" id="pres">Tekanan -- hPa</span>
        <span class="tag" id="vis">Jarak -- km</span>
      </div>

      <div style="margin-top:14px;">
        <div class="card-label">Suhu 6 Jam ke Depan</div>
        <canvas id="tempCanvas" style="width:100%; height:90px; display:block;"></canvas>
      </div>
    </div>

    <div>
      <div class="card-label">Radar Hujan 12 Jam</div>
      <div id="rainGrid" style="display:grid; grid-template-columns: repeat(12, 1fr); gap: 4px; margin-top:8px;"></div>
      <div id="rainTimes" style="display:flex; justify-content:space-between; margin-top:6px; color:var(--muted); font-size:11px; font-family:'JetBrains Mono',monospace;"></div>
    </div>
  </div>

  <!-- Table 12h -->
  <div class="card" style="margin-top:12px;">
    <div class="card-label">Per Jam (12 Jam)</div>
    <div style="overflow:auto">
      <table style="width:100%; border-collapse:collapse; font-size:13px;">
        <thead>
          <tr>
            <th style="text-align:left; padding:7px 8px; color:var(--muted); font-size:11px;">Waktu</th>
            <th style="text-align:left; padding:7px 8px; color:var(--muted); font-size:11px;">Cuaca</th>
            <th style="text-align:left; padding:7px 8px; color:var(--muted); font-size:11px;">Suhu</th>
            <th style="text-align:left; padding:7px 8px; color:var(--muted); font-size:11px;">Hujan %</th>
            <th style="text-align:left; padding:7px 8px; color:var(--muted); font-size:11px;">Angin</th>
            <th style="text-align:left; padding:7px 8px; color:var(--muted); font-size:11px;">Arah</th>
          </tr>
        </thead>
        <tbody id="hourlyBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 7-day -->
  <div class="card" style="margin-top:12px;">
    <div class="card-label">7 Hari ke Depan</div>
    <div id="dailyGrid" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:10px;"></div>
  </div>

</div>

<script>
const GEO = 'https://geocoding-api.open-meteo.com/v1/search';
const API = 'https://api.open-meteo.com/v1/forecast';
const el = (id) => document.getElementById(id);
const pad = (n) => String(n).padStart(2, '0');

const WC = {
  0:['Cerah','☀️'],1:['Cerah','🌤'],2:['Berawan','⛅'],3:['Mendung','☁️'],
  45:['Berkabut','🌫'],48:['Kabut tebal','🌫'],
  51:['Gerimis','🌦'],53:['Gerimis sedang','🌦'],55:['Gerimis lebat','🌦'],
  61:['Hujan ringan','🌧'],63:['Hujan','🌧'],65:['Hujan lebat','🌧'],
  71:['Salju ringan','❄️'],73:['Salju','❄️'],75:['Salju lebat','❄️'],
  80:['Semburan ringan','🌦'],81:['Semburan','🌧'],82:['Semburan lebat','🌧'],
  95:['Badai petir','⛈'],96:['Petir + es','⛈'],99:['Petir + es lebat','⛈']
};
const winfo = (code) => WC[code] || ['Cuaca','🌦'];

const CARD_DIRS = ['U','TL','T','TG','S','BD','B','BL','U'];
const FULL_DIRS = ['Utara','Timur Laut','Timur','Tenggara','Selatan','Barat Daya','Barat','Barat Laut'];
const degToCard = (deg) => CARD_DIRS[Math.round(((deg % 360) + 360) % 360 / 45) % 8];
const degToFull = (deg) => FULL_DIRS[Math.round(((deg % 360) + 360) % 360 / 45) % 8];

let currentLat = null, currentLon = null;
const setStatus = (msg, type='muted') => { el('status').innerHTML = `<span style="color:var(--${type})">${msg}</span>`; };
const setLoading = (show) => {};

const DAYS_ID = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

async function geocode(name) {
  const r = await fetch(`${GEO}?name=${encodeURIComponent(name)}&count=1&language=id&format=json`);
  if (!r.ok) throw new Error('Gagal mencari lokasi');
  const d = await r.json();
  if (!d.results?.length) throw new Error(`"${name}" tidak ditemukan`);
  const x = d.results[0];
  return { lat: x.latitude, lon: x.longitude, city: x.name, country: x.country };
}

async function ipLoc() {
  const r = await fetch('https://ipapi.co/json/');
  if (!r.ok) throw new Error('Lokasi IP gagal');
  const d = await r.json();
  return { lat: Number(d.latitude), lon: Number(d.longitude), city: d.city || 'Lokasi Anda' };
}

async function weather(lat, lon) {
  const p = new URLSearchParams({
    latitude: lat, longitude: lon,
    current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,wind_gusts_10m,uv_index,visibility',
    hourly: 'temperature_2m,apparent_temperature,precipitation_probability,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m',
    daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,sunrise,sunset,uv_index_max,precipitation_probability_max',
    timezone: 'auto',
    forecast_days: 7
  });
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?${p}`);
  if (!r.ok) throw new Error('Gagal mengambil data cuaca');
  return r.json();
}

async function airQuality(lat, lon) {
  try {
    const p = new URLSearchParams({
      latitude: lat, longitude: lon,
      current: 'european_aqi,pm2_5,pm10,carbon_monoxide,nitrogen_dioxide',
      timezone: 'auto'
    });
    const r = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?${p}`);
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

function drawTempChart(temps, hours) {
  const canvas = el('tempCanvas');
  if (!canvas || !temps.length) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = (rect.width || 400);
  canvas.height = 90;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  const min = Math.min(...temps) - 1;
  const max = Math.max(...temps) + 1;
  const range = max - min || 1;
  const px = (i) => (i / (temps.length - 1)) * (w - 20) + 10;
  const py = (v) => h - 20 - ((v - min) / range) * (h - 30);
  ctx.beginPath();
  ctx.moveTo(px(0), py(temps[0]));
  for (let i = 1; i < temps.length; i++) {
    const x0 = px(i - 1), y0 = py(temps[i - 1]);
    const x1 = px(i), y1 = py(temps[i]);
    ctx.bezierCurveTo((x0 + x1) / 2, y0, (x0 + x1) / 2, y1, x1, y1);
  }
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#3b82f6';
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(74,96,128,0.9)';
  ctx.textAlign = 'center';
  temps.forEach((v, i) => {
    if (i % 2 === 0) {
      ctx.fillText(`${Math.round(v)}°`, px(i), py(v) - 6);
      if (hours?.[i] !== undefined) ctx.fillText(`${pad(hours[i])}`, px(i), h - 4);
    }
  });
}

function renderHourlyTable(d) {
  const tbody = el('hourlyBody');
  tbody.innerHTML = '';
  const times = d.hourly.time || [];
  const today = new Date().toISOString().slice(0, 10);
  const curHour = new Date().getHours();
  let idx = times.findIndex(t => t.startsWith(today));
  idx = idx < 0 ? 0 : idx + curHour;
  for (let i = idx; i < Math.min(idx + 12, times.length); i++) {
    const dt = new Date(times[i]);
    const hh = pad(dt.getHours()), mn = pad(dt.getMinutes());
    const t = Math.round(d.hourly.temperature_2m[i]);
    const tf = Math.round(d.hourly.apparent_temperature?.[i] ?? t);
    const [desc, icon] = winfo(d.hourly.weather_code[i]);
    const rain = Math.round(d.hourly.precipitation_probability[i] || 0);
    const ws = Math.round(d.hourly.wind_speed_10m[i] || 0);
    const wd = degToCard(d.hourly.wind_direction_10m[i] ?? 0);
    const row = `<tr style="border-bottom:1px solid #1a2640">
      <td style="padding:8px 6px; font-family:'JetBrains Mono',monospace; color:#fff">${hh}:${mn}</td>
      <td style="padding:8px 6px">${icon} ${desc}</td>
      <td style="padding:8px 6px; font-weight:700; color:#fff">${t}°</td>
      <td style="padding:8px 6px; color:${rain >= 70 ? '#ff8c42' : 'var(--muted)'}">${rain}%</td>
      <td style="padding:8px 6px; color:var(--muted)">${ws} km/j</td>
      <td style="padding:8px 6px; color:var(--cyan)">${wd}</td>
    </tr>`;
    tbody.innerHTML += row;
  }
}

function renderDailyGrid(d) {
  const grid = el('dailyGrid');
  grid.innerHTML = '';
  (d.daily.time || []).forEach((date, i) => {
    const dd = new Date(`${date}T00:00:00`);
    const label = i === 0 ? 'Hari ini' : DAYS_ID[dd.getDay()];
    const [, icon] = winfo(d.daily.weather_code[i]);
    const max = Math.round(d.daily.temperature_2m_max[i]);
    const min = Math.round(d.daily.temperature_2m_min[i]);
    const rain = Math.round(d.daily.precipitation_probability_max?.[i] || 0);
    const card = `<div style="border:1px solid var(--border); border-radius:12px; padding:12px 8px; text-align:center; background:#0a0f18;">
      <div style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px">${label}</div>
      <div style="font-size:22px; margin:6px 0;">${icon}</div>
      <div style="font-size:12px;"><span style="color:var(--red)">${max}°</span> / <span style="color:var(--cyan)">${min}°</span></div>
      <div style="font-size:11px; color:#60a5fa; margin-top:3px">🌧 ${rain}%</div>
    </div>`;
    grid.innerHTML += card;
  });
}

function renderRainGrid(d) {
  const grid = el('rainGrid');
  const timesRow = el('rainTimes');
  grid.innerHTML = '';
  timesRow.innerHTML = '';
  const times = d.hourly.time || [];
  const today = new Date().toISOString().slice(0, 10);
  const curHour = new Date().getHours();
  let idx = times.findIndex(t => t.startsWith(today));
  idx = idx < 0 ? 0 : idx + curHour;
  const vals = [];
  const hrs = [];
  for (let i = idx; i < Math.min(idx + 12, times.length); i++) {
    vals.push(Math.round(d.hourly.precipitation_probability[i] || 0));
    hrs.push(new Date(times[i]).getHours());
  }
  const maxV = Math.max(...vals, 1);
  vals.forEach((v, i) => {
    const h = Math.max(6, Math.round((v / maxV) * 100));
    const bg = v >= 70 ? '#7c3aed' : v >= 40 ? '#2563eb' : v >= 20 ? '#10b981' : '#1e293b';
    const cell = `<div style="height:${h}%; background:${bg}; border-radius:3px;" title="${v}%"></div>`;
    grid.innerHTML += cell;
  });
  hrs.forEach((h, i) => { if (i % 2 === 0) timesRow.innerHTML += `<span>${pad(h)}:00</span>`; });
}

function render(d, aqi) {
  const c = d.current || {};
  const [desc, icon] = winfo(c.weather_code);

  el('temp').textContent = `${Math.round(c.temperature_2m ?? 0)}°`;
  el('desc').textContent = desc;
  el('icon').textContent = icon;
  el('feels').textContent = `Terasa ${Math.round(c.apparent_temperature ?? 0)}°`;
  el('hum').textContent = `Kelembaban ${c.relative_humidity_2m ?? '--'}%`;
  el('wind').textContent = `Angin ${Math.round(c.wind_speed_10m ?? 0)} km/j`;
  el('windDir').textContent = `Arah ${degToFull(c.wind_direction_10m ?? 0)} (${degToCard(c.wind_direction_10m ?? 0)})`;
  el('pres').textContent = `Tekanan ${Math.round(c.surface_pressure ?? 0)} hPa`;
  el('vis').textContent = `Jarak ${c.visibility != null ? (c.visibility / 1000).toFixed(1) + ' km' : '-- km'}`;

  renderRainGrid(d);

  const temps = [], hours = [];
  const times = d.hourly.time || [];
  const today = new Date().toISOString().slice(0, 10);
  let idx = times.findIndex(t => t.startsWith(today));
  idx = idx < 0 ? 0 : idx + new Date().getHours();
  for (let i = idx; i < Math.min(idx + 12, times.length); i++) {
    temps.push(d.hourly.temperature_2m[i]);
    hours.push(new Date(times[i]).getHours());
  }
  setTimeout(() => drawTempChart(temps, hours), 100);

  renderHourlyTable(d);
  renderDailyGrid(d);
}

async function startCity(name) {
  try {
    setStatus('Mencari lokasi...');
    const loc = await geocode(name);
    setStatus('Mengambil data cuaca...');
    currentLat = loc.lat; currentLon = loc.lon;
    const [wData, aqiData] = await Promise.all([weather(loc.lat, loc.lon), airQuality(loc.lat, loc.lon)]);
    render(wData, aqiData);
    setStatus(`✓ ${loc.city}${loc.country ? ', ' + loc.country : ''}`);
  } catch (e) { setStatus(`⚠ ${e.message}`, 'err'); }
}

async function startGPS() {
  if (!navigator.geolocation) return setStatus('GPS tidak didukung browser', 'err');
  setStatus('🛰️ Mencari GPS...');
  navigator.geolocation.getCurrentPosition(
    async (p) => {
      currentLat = p.coords.latitude;
      currentLon = p.coords.longitude;
      setStatus('GPS terkunci. Mengambil data...');
      try {
        const [wData, aqiData] = await Promise.all([weather(currentLat, currentLon), airQuality(currentLat, currentLon)]);
        render(wData, aqiData);
        setStatus(`✓ GPS ±${Math.round(p.coords.accuracy)}m`);
      } catch (e) { setStatus(`⚠ ${e.message}`, 'err'); }
    },
    (e) => setStatus(`GPS error: ${e.message}`, 'err'),
    { enableHighAccuracy: true, timeout: 20000 }
  );
}

async function startIP() {
  try {
    setStatus('Mendeteksi via IP...');
    const loc = await ipLoc();
    setStatus('Mengambil data cuaca...');
    currentLat = loc.lat; currentLon = loc.lon;
    const [wData, aqiData] = await Promise.all([weather(loc.lat, loc.lon), airQuality(loc.lat, loc.lon)]);
    render(wData, aqiData);
    setStatus(`✓ IP • ${loc.city}`);
  } catch (e) { setStatus(`⚠ ${e.message}`, 'err'); }
}

el('goBtn').onclick = () => startCity(el('city').value.trim() || 'Tokyo');
el('gpsBtn').onclick = startGPS;
el('ipBtn').onclick = startIP;
el('refreshBtn').onclick = async () => {
  if (currentLat) {
    setStatus('Refresh...');
    try {
      const [wData, aqiData] = await Promise.all([weather(currentLat, currentLon), airQuality(currentLat, currentLon)]);
      render(wData, aqiData);
      setStatus(`✓ Diperbarui ${new Date().toLocaleTimeString('id-ID')}`);
    } catch (e) { setStatus(`⚠ ${e.message}`, 'err'); }
  } else startCity(el('city').value.trim() || 'Tokyo');
};
el('city').addEventListener('keydown', (e) => { if (e.key === 'Enter') startCity(el('city').value.trim() || 'Tokyo'); });

// Init
startCity('Tokyo');
</script>
</body>
</html>
