<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weather Radar GPS</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --border: #22272e;
    --muted: #8b949e;
    --text: #e6edf3;
    --blue: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --cyan: #39c5cf;
    --font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: radial-gradient(1200px 600px at 10% -10%, #0c1f2e 0%, #0e1116 40%);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 18px; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    padding: 10px 12px; border: 1px solid var(--border); background: var(--panel); border-radius: 10px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand b { color: var(--blue); letter-spacing: 0.5px; }
  .pill {
    font-size: 11px; color: var(--muted); border: 1px solid var(--border); padding: 2px 8px; border-radius: 999px; background: #0d1117;
  }
  .search { display: flex; gap: 8px; margin-top: 12px; }
  .search input {
    flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: #0d1117; color: var(--text); outline: none; font-family: inherit;
  }
  .search input:focus { border-color: #388bfd66; box-shadow: 0 0 0 3px #0d111799, 0 0 0 5px #388bfd22; }
  .btn {
    padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: #21262d; color: var(--text); cursor: pointer; font-family: inherit;
  }
  .btn:hover { background: #292e36; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 14px; }
  @media (max-width: 680px) { .grid { grid-template-columns: 1fr; } }
  .card {
    border: 1px solid var(--border); background: linear-gradient(180deg, #111820 0%, #0f141c 100%); border-radius: 10px; padding: 14px;
  }
  .card h3 { margin: 0 0 8px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
  .big { font-size: 34px; font-weight: 700; }
  .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .accent { color: var(--blue); }
  .ok { color: var(--green); }
  .warn { color: var(--yellow); }
  .err { color: var(--red); }
  .row { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #161b22; color: var(--text); }
  th { color: var(--muted); font-weight: 500; }
  .bar { height: 10px; background: #21262d; border-radius: 999px; overflow: hidden; }
  .fill { height: 100%; background: linear-gradient(90deg, #2a7fff, #7fd2ff); border-radius: 999px; }
  .rain {
    height: 14px; display: flex; gap: 2px; margin-top: 10px;
  }
  .rain div { flex: 1; border-radius: 2px; background: #2f3542; }
  .rain .r1 { background: linear-gradient(180deg,#3fb950,#2ea043); }
  .rain .r2 { background: linear-gradient(180deg,#58a6ff,#1f6feb); }
  .rain .r3 { background: linear-gradient(180deg,#a371f7,#8a2be2); }
  .rain .r4 { background: linear-gradient(180deg,#f85149,#da3633); }
  .status { min-height: 18px; font-size: 12px; color: var(--muted); margin-top: 6px; }
  .hidden { display: none; }
  .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; background: #0d1117; border: 1px solid var(--border); color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div>
        <b>Weather Radar GPS</b>
        <div class="sub">Open-Meteo • geolocation • rain grid • no API key</div>
      </div>
    </div>
    <div class="row">
      <span class="pill" id="clock">--:--</span>
      <span class="pill" id="locPill">IP lokalisasi aktif</span>
    </div>
  </div>

  <div class="search">
    <input id="city" placeholder="Cari kota / lokasi..." value="Tokyo" />
    <button class="btn" id="goBtn">Cari</button>
    <button class="btn" id="gpsBtn">GPS</button>
    <button class="btn" id="ipBtn">IP</button>
  </div>
  <div class="status" id="status"></div>

  <div class="grid">
    <div class="card">
      <h3>Sekarang</h3>
      <div class="row">
        <div class="big" id="temp">--°</div>
        <div class="sub" id="desc">Memuat...</div>
      </div>
      <div class="sub" id="feels">Terasa: --°</div>
      <div style="margin-top:10px" class="sub">
        <span class="tag" id="hum">Kelembapan --%</span>
        <span class="tag" id="wind">Angin -- km/h</span>
        <span class="tag" id="pres">Tekanan -- hPa</span>
      </div>
    </div>

    <div class="card">
      <h3>Proyeksi 24 jam (hujan)</h3>
      <div class="rain" id="rainRow"></div>
      <div class="sub" style="margin-top:8px" id="rainSummary">--</div>
    </div>

    <div class="card">
      <h3>Per Jam</h3>
      <div style="overflow:auto">
      <table>
        <thead><tr><th>Waktu</th><th>Cuaca</th><th>Suhu</th><th>Hujan %</th></tr></thead>
        <tbody id="hourlyBody"></tbody>
      </table>
      </div>
    </div>

    <div class="card">
      <h3>3 Hari</h3>
      <div style="overflow:auto">
      <table>
        <thead><tr><th>Hari</th><th>Cuaca</th><th>Max</th><th>Min</th><th>Curah</th></tr></thead>
        <tbody id="dailyBody"></tbody>
      </table>
      </div>
    </div>
  </div>
</div>

<script>
const GEO = 'https://geocoding-api.open-meteo.com/v1/search';
const API = 'https://api.open-meteo.com/v1/forecast';
const el = (id) => document.getElementById(id);

function setStatus(msg, type='muted') {
  el('status').innerHTML = `<span class="${type}">${msg}</span>`;
}
function pad(n){ return String(n).padStart(2,'0'); }

async function geocode(name) {
  const r = await fetch(`${GEO}?name=${encodeURIComponent(name)}&count=1&language=id&format=json`);
  if (!r.ok) throw new Error('Gagal cari lokasi');
  const d = await r.json();
  if (!d.results?.length) throw new Error('Kota tidak ditemukan');
  const x = d.results[0];
  el('locPill').textContent = `${x.name}${x.country?', ':''}${x.country||''}`;
  return { lat: x.latitude, lon: x.longitude, city: x.name, country: x.country };
}

async function ipLoc() {
  const r = await fetch('https://ipapi.co/json/');
  if (!r.ok) throw new Error('IP lokasi gagal');
  const d = await r.json();
  el('locPill').textContent = `IP • ${d.city||''}${d.country?', ':''}${d.country||''}`;
  return { lat: Number(d.latitude), lon: Number(d.longitude), city: d.city || 'Lokasi Anda', country: d.country_name };
}

async function weather(lat, lon) {
  const p = new URLSearchParams({
    latitude: lat, longitude: lon,
    current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,surface_pressure',
    hourly: 'temperature_2m,precipitation_probability,weather_code',
    daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum',
    timezone: 'auto', forecast_days: 3
  });
  const r = await fetch(`${API}?${p}`);
  if (!r.ok) throw new Error('Gagal ambil cuaca');
  return r.json();
}

function codeInfo(code) {
  const m = {
    0:['Cerah','☀️'],1:['Cerah','🌤'],2:['Berawan','⛅'],3:['Mendung','☁️'],
    45:['Berkabut','🌫'],48:['Kabut tebal','🌫'],
    51:['Gerimis','🌦'],53:['Hujan','🌧'],55:['Lebat','🌧'],
    61:['Hujan ringan','🌧'],63:['Hujan','🌧'],65:['Lebat','🌧'],
    80:['Semburan','🌦'],81:['Semburan','🌧'],82:['Lebat','🌧']
  };
  return m[code] || ['Cuaca', '🌦'];
}

function render(d) {
  const c = d.current || {};
  const [desc, icon] = codeInfo(c.weather_code);
  el('temp').textContent = `${Math.round(c.temperature_2m||0)}°`;
  el('desc').textContent = `${icon} ${desc}`;
  el('feels').textContent = `Terasa: ${Math.round(c.apparent_temperature||0)}°`;
  el('hum').textContent = `Kelembapan ${c.relative_humidity_2m??'--'}%`;
  el('wind').textContent = `Angin ${Math.round(c.wind_speed_10m||0)} km/h`;
  el('pres').textContent = `Tekanan ${Math.round(c.surface_pressure||0)} hPa`;

  // hourly 8 next hours
  const tbody = el('hourlyBody'); tbody.innerHTML = '';
  const now = new Date().toISOString().slice(0,10);
  const currentHour = new Date().getHours();
  const idx = (d.hourly?.time||[]).findIndex(t => t.startsWith(now));
  const start = Math.max(idx + currentHour, 0);
  for (let i = start; i < Math.min(start+8, d.hourly.time.length); i++) {
    const hh = new Date(d.hourly.time[i]).getHours();
    const t = Math.round(d.hourly.temperature_2m[i]);
    const [desc2, icon2] = codeInfo(d.hourly.weather_code[i]);
    const rain = Math.round(d.hourly.precipitation_probability[i]||0);
    tbody.innerHTML += `<tr><td>${pad(hh)}:00</td><td>${icon2} ${desc2}</td><td>${t}°</td><td>${rain}%</td></tr>`;
  }

  // daily 3 days
  const dt = el('dailyBody'); dt.innerHTML = '';
  const days = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  (d.daily?.time||[]).forEach((date, i) => {
    const dd = new Date(`${date}T00:00:00`);
    const label = i===0 ? 'Hari ini' : days[dd.getDay()];
    const [desc3, icon3] = codeInfo(d.daily.weather_code[i]);
    const max = Math.round(d.daily.temperature_2m_max[i]);
    const min = Math.round(d.daily.temperature_2m_min[i]);
    const sum = Math.round(d.daily.precipitation_sum[i]||0);
    dt.innerHTML += `<tr><td>${label}</td><td>${icon3} ${desc3}</td><td>${max}°</td><td>${min}°</td><td>${sum} mm</td></tr>`;
  });

  // rain 24h from now
  const times = d.hourly?.time || [];
  const vals = [];
  for (let i = Math.max(idx,0); i < Math.min(idx+24, times.length); i++) {
    vals.push(d.hourly.precipitation_probability[i] || 0);
  }
  const row = el('rainRow'); row.innerHTML = '';
  const color = (v) => {
    if (v < 20) return 'r1';
    if (v < 50) return 'r2';
    if (v < 80) return 'r3';
    return 'r4';
  };
  vals.forEach(v => { row.innerHTML += `<div class="${color(v)}" title="${v}%"></div>`; });
  el('rainSummary').textContent = `Kemungkinan hujan 24 jam: rata-rata ${Math.round(vals.reduce((a,b)=>a+b,0)/Math.max(vals.length,1))}%`;
}

async function startCity(name) {
  try {
    setStatus('Mencari lokasi...', 'accent');
    const loc = await geocode(name);
    setStatus('Mengambil data cuaca...', 'accent');
    const data = await weather(loc.lat, loc.lon);
    setStatus(`Sumber: Open-Meteo • Lokasi: ${loc.city}`, 'ok');
    render(data);
  } catch (e) {
    setStatus(e.message, 'err');
  }
}

async function startGPS() {
  try {
    setStatus('Mengambil GPS akurat (high accuracy)...', 'accent');
    const pos = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error('GPS tidak didukung browser'));
      navigator.geolocation.getCurrentPosition(
        (p) => resolve({ lat: p.coords.latitude, lon: p.coords.longitude }),
        (e) => reject(new Error('GPS ditolak / timeout (cek izin lokasi)')),
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    });
    el('locPill').textContent = `GPS • ${pos.lat.toFixed(4)}, ${pos.lon.toFixed(4)}`;
    setStatus('Mengambil data cuaca...', 'accent');
    const data = await weather(pos.lat, pos.lon);
    setStatus('Sumber: Open-Meteo • Lokasi via GPS', 'ok');
    render(data);
  } catch (e) {
    setStatus(e.message, 'err');
  }
}

async function startIP() {
  try {
    setStatus('Melokasi via IP...', 'accent');
    const loc = await ipLoc();
    setStatus('Mengambil data cuaca...', 'accent');
    const data = await weather(loc.lat, loc.lon);
    setStatus('Sumber: Open-Meteo • Lokasi via IP', 'ok');
    render(data);
  } catch (e) {
    setStatus(e.message, 'err');
  }
}

el('goBtn').onclick = () => startCity(el('city').value.trim() || 'Tokyo');
el('gpsBtn').onclick = startGPS;
el('ipBtn').onclick = startIP;
el('city').addEventListener('keydown', (e) => { if (e.key === 'Enter') startCity(el('city').value.trim() || 'Tokyo'); });

setInterval(() => {
  const now = new Date();
  el('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
}, 1000);
(new Date()).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
startCity('Tokyo');
</script>
</body>
</html>
